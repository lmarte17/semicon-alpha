event_types:
  - event_type: export_controls_regulation
    label: Export Controls / Regulation
    description: Policy changes that restrict semiconductor trade, technology transfer, or equipment access.
    keywords:
      - export control
      - export controls
      - entity list
      - license requirement
      - restricted shipment
      - sanctions
      - shipment restriction
      - trade restriction
    secondary_keywords:
      - ban
      - curbs
      - regulation
      - rules tighten
      - tariff
    theme_ids:
      - theme:leading_edge_logic
      - theme:wafer_fab_equipment
    segment_hints:
      - equipment
      - foundry
      - eda
    default_direction: negative
    base_severity: high

  - event_type: ai_demand_hyperscaler_capex
